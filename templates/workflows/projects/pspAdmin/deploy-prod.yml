# Template source: pspAdmin/.github/workflows/deploy-prod.yml
name: Deploy PSPAdmin Admin PROD

on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on:
      - self-hosted
      - Windows
      - pspAdmin-prod2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Install Yarn and dependencies
        shell: powershell
        run: |
          node -v
          npm -v
          npm i -g yarn@1.22.22
          yarn -v
          yarn install --frozen-lockfile

      - name: Build PROD
        shell: powershell
        run: |
          Write-Host "========================================"
          Write-Host "[INFO] Build PROD - Debug Information"
          Write-Host "========================================"
          Write-Host "[INFO] Current working directory:"
          Get-Location
          Write-Host "[INFO] GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          Write-Host "[INFO] Current commit:"
          git rev-parse HEAD
          Write-Host "[INFO] Checking if dist exists before build:"
          if (Test-Path "$env:GITHUB_WORKSPACE\dist") {
            Write-Host "[WARNING] dist directory already exists before build!"
            (Get-ChildItem "$env:GITHUB_WORKSPACE\dist" -ErrorAction SilentlyContinue | Measure-Object).Count
          } else {
            Write-Host "[INFO] dist directory does not exist (expected)"
          }
          Write-Host ""
          Write-Host "[INFO] Installing yarn..."
          npm i -g yarn@1.22.22 | Out-Null
          Write-Host "[INFO] Yarn version:"
          yarn -v
          Write-Host ""
          Write-Host "[INFO] Checking package.json for build:prod script:"
          Get-Content package.json | Select-String "build:prod"
          Write-Host ""
          Write-Host "[INFO] Starting yarn build:prod..."
          Write-Host "========================================"
          yarn build:prod
          $BUILD_EXIT = $LASTEXITCODE
          Write-Host "========================================"
          Write-Host "[RESULT] Build command completed"
          Write-Host "[RESULT] Build exit code: $BUILD_EXIT"
          Write-Host ""

          if ($BUILD_EXIT -ne 0) {
            Write-Host "[ERROR] ========================================"
            Write-Host "[ERROR] Build FAILED with exit code $BUILD_EXIT"
            Write-Host "[ERROR] ========================================"
            Write-Host "[INFO] Checking current directory contents:"
            Get-ChildItem -Name
            exit $BUILD_EXIT
          }

          Write-Host "[SUCCESS] Build command succeeded (exit code 0)"
          Write-Host ""
          Write-Host "[INFO] Checking if dist directory was created..."
          $DIST_DIR = "$env:GITHUB_WORKSPACE\dist"

          if (Test-Path $DIST_DIR) {
            Write-Host "[SUCCESS] dist directory exists at: $DIST_DIR"
            Write-Host "[INFO] Dist directory contents:"
            Get-ChildItem $DIST_DIR -Name
            Write-Host "[INFO] File count in dist:"
            (Get-ChildItem $DIST_DIR -ErrorAction SilentlyContinue | Measure-Object).Count

            if (Test-Path "$DIST_DIR\index.html") {
              Write-Host "[SUCCESS] index.html found"
              Write-Host "[INFO] index.html size:"
              Get-Item "$DIST_DIR\index.html" | Select-Object Name, Length
            } else {
              Write-Host "[ERROR] index.html NOT found in dist!"
              Write-Host "[INFO] Files in dist root:"
              Get-ChildItem $DIST_DIR -Name
              exit 1
            }
          } else {
            Write-Host "[ERROR] dist directory was NOT created after build!"
            Write-Host "[ERROR] This means yarn build:prod did not produce output"
            Write-Host ""
            Write-Host "[DEBUG] Current directory:"
            Get-Location
            Write-Host "[DEBUG] Current directory contents:"
            Get-ChildItem -Name
            Write-Host "[DEBUG] Checking for other possible output directories:"
            if (Test-Path "build") {
              Write-Host "[INFO] Found 'build' directory instead of 'dist'"
              Get-ChildItem "build" -Name
            }
            if (Test-Path "output") {
              Write-Host "[INFO] Found 'output' directory"
              Get-ChildItem "output" -Name
            }
            exit 1
          }

          Write-Host "========================================"
          Write-Host "[SUCCESS] Build verification completed"
          Write-Host "========================================"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: pspadmin-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  deploy:
    needs: build
    strategy:
      matrix:
        runner:
          - pspAdmin-prod1
          - pspAdmin-prod2

    runs-on:
      - self-hosted
      - Windows
      - ${{ matrix.runner }}

    concurrency:
      group: pspadmin-admin-prod-deploy-${{ matrix.runner }}
      cancel-in-progress: false

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: pspadmin-dist
          path: dist

      - name: Verify downloaded artifact
        shell: powershell
        run: |
          $SRC = "$env:GITHUB_WORKSPACE\dist"
          Write-Host "[INFO] RunnerName: $env:RUNNER_NAME"
          Write-Host "[INFO] ComputerName: $env:COMPUTERNAME"
          Write-Host "[INFO] GITHUB_WORKSPACE: $env:GITHUB_WORKSPACE"
          Write-Host "[INFO] Downloaded dist path: $SRC"

          if (-not (Test-Path $SRC)) {
            Write-Host "[ERROR] Downloaded dist directory not found: $SRC"
            exit 1
          }

          if (-not (Test-Path "$SRC\index.html")) {
            Write-Host "[ERROR] index.html not found in downloaded dist"
            exit 1
          }

          Write-Host "[INFO] Artifact verified successfully"

      - name: Deploy dist -> local C:\BI\pspAdmin (mirror with rollback)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"

          $SRC = "$env:GITHUB_WORKSPACE\dist"
          $DST = "C:\BI\pspAdmin"

          if (-not (Test-Path $SRC)) {
            Write-Host "[ERROR] Source dist not found: $SRC"
            exit 1
          }

          Write-Host "[INFO] ========================================"
          Write-Host "[INFO] Starting deployment"
          Write-Host "[INFO] RunnerName    : $env:RUNNER_NAME"
          Write-Host "[INFO] ComputerName  : $env:COMPUTERNAME"
          Write-Host "[INFO] Source        : $SRC"
          Write-Host "[INFO] Destination   : $DST"
          Write-Host "[INFO] ========================================"

          if (-not (Test-Path $DST)) {
            Write-Host "[INFO] Destination does not exist. Creating: $DST"
            New-Item -ItemType Directory -Path $DST -Force | Out-Null
          }

          $timestamp = Get-Date -Format "yyyyMMddHHmmss"
          $backupRoot = Join-Path $env:TEMP "pspadmin-deploy-backup-$timestamp"
          $backup = Join-Path $backupRoot "current"

          Write-Host "[INFO] Backup root: $backupRoot"
          Write-Host "[INFO] Backup path: $backup"
          New-Item -ItemType Directory -Path $backup -Force | Out-Null

          Write-Host "[INFO] Creating backup of current deployment..."
          robocopy $DST $backup /MIR /FFT /Z /R:3 /W:5 /NP
          $backupExit = $LASTEXITCODE
          Write-Host "[INFO] Backup robocopy exit code: $backupExit"

          if ($backupExit -ge 8) {
            Write-Host "[ERROR] Backup failed. Deployment aborted."
            exit 1
          }

          Write-Host "[INFO] Backup completed successfully."
          Write-Host "[INFO] Deploying new dist to destination..."

          robocopy $SRC $DST /MIR /FFT /Z /R:3 /W:5 /NP
          $deployExit = $LASTEXITCODE
          Write-Host "[INFO] Deploy robocopy exit code: $deployExit"

          if ($deployExit -lt 8) {
            Write-Host "[SUCCESS] Deployment completed successfully on $env:RUNNER_NAME"
            exit 0
          }

          Write-Host "[ERROR] Deployment failed. Starting rollback..."

          robocopy $backup $DST /MIR /FFT /Z /R:3 /W:5 /NP
          $rollbackExit = $LASTEXITCODE
          Write-Host "[INFO] Rollback robocopy exit code: $rollbackExit"

          if ($rollbackExit -ge 8) {
            Write-Host "[ERROR] Rollback encountered errors."
            exit 1
          }

          Write-Host "[INFO] Rollback completed successfully."
          exit 1
